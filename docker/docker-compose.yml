services:
  llm:
    build:
      context: ../
      dockerfile: docker/model/Dockerfile
    volumes:
      - ../models:/models:ro
    command: >
      -m /models/${MODEL_FILENAME:-qwen2.5-3b-instruct-q4_k_m.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
      --threads ${LLM_THREADS:-4}
      --parallel 1
      -n 512
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s   # model load into RAM can take ~30–45 s on CPU
    restart: unless-stopped

  api:
    build:
      context: ../
      dockerfile: docker/backend/Dockerfile
    environment:
      LLAMA_CPP_URL: http://llm:8080
    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../src/static:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
